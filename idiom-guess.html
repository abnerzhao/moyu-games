<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#f8f6ef">
  <title>看图猜成语</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <style>
    * { box-sizing: border-box; }
    :root {
      --bg: #f8f6ef;
      --ink: #151515;
      --muted: #6d6a62;
      --line: #e3ded2;
      --accent: #0f766e;
      --accent-weak: #d7ebe6;
      --mono: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
      --sans: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
    }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--ink);
      font-family: var(--sans);
      letter-spacing: 0;
    }
    a { color: inherit; text-decoration: none; }
    button, input { font: inherit; }
    button { cursor: pointer; }
    .page {
      width: min(100%, 980px);
      margin: 0 auto;
      padding: 28px 18px 46px;
    }
    .site-head {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 18px;
      border-bottom: 1px solid var(--line);
      padding-bottom: 16px;
    }
    h1 {
      margin: 0;
      font-size: 24px;
      font-weight: 760;
      line-height: 1.15;
    }
    .nav-link,
    .small,
    .foot {
      color: var(--muted);
      font-family: var(--mono);
      font-size: 12px;
      line-height: 1.45;
    }
    .game-nav {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: flex-end;
    }
    .nav-link:hover,
    .nav-link.is-active {
      color: var(--ink);
    }
    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 280px;
      gap: 18px;
      padding-top: 22px;
      align-items: start;
    }
    .picture,
    .panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 253, 247, 0.82);
    }
    .picture {
      min-height: 420px;
      padding: 28px;
      display: grid;
      place-items: center;
    }
    .scene {
      width: min(100%, 520px);
      aspect-ratio: 1.2;
      display: grid;
      place-items: center;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fffdf7;
      font-size: clamp(48px, 10vw, 92px);
      line-height: 1.1;
      text-align: center;
    }
    .scene small {
      display: block;
      margin-top: 14px;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.4;
    }
    .panel {
      padding: 16px;
      display: grid;
      gap: 12px;
    }
    input {
      width: 100%;
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fffdf7;
      color: var(--ink);
      padding: 0 12px;
      outline: 0;
    }
    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-weak);
    }
    .btn {
      min-height: 42px;
      border: 1px solid var(--ink);
      border-radius: 6px;
      background: var(--ink);
      color: #fff;
      padding: 0 13px;
      font-weight: 720;
    }
    .btn.secondary {
      background: transparent;
      color: var(--ink);
    }
    .message {
      min-height: 22px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }
    .message.strong {
      color: var(--accent);
      font-weight: 720;
    }
    .answer {
      border-top: 1px solid var(--line);
      padding-top: 12px;
      display: grid;
      gap: 6px;
    }
    .answer-name {
      font-size: 24px;
      font-weight: 760;
    }
    .foot {
      border-top: 1px solid var(--line);
      margin-top: 24px;
      padding-top: 14px;
    }
    @media (max-width: 760px) {
      .site-head {
        align-items: flex-start;
        flex-direction: column;
      }
      .game-nav {
        justify-content: flex-start;
      }
      .layout {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <header class="site-head">
      <h1>看图猜成语</h1>
      <nav class="game-nav" aria-label="小游戏导航">
        <a class="nav-link" href="games.html">全部</a>
        <a class="nav-link" href="shape-guess.html">地理</a>
        <a class="nav-link" href="sudoku.html">数独</a>
        <a class="nav-link" href="maze.html">迷宫</a>
        <a class="nav-link" href="lantern-riddles.html">灯谜</a>
        <a class="nav-link is-active" href="idiom-guess.html">成语</a>
        <a class="nav-link" href="english.html">英语</a>
      </nav>
    </header>

    <section class="layout">
      <div class="picture">
        <div class="scene" id="scene"></div>
      </div>
      <aside class="panel">
        <div class="small" id="meta">IDIOM</div>
        <input id="answerInput" autocomplete="off" placeholder="输入四字成语">
        <button class="btn" type="button" id="checkButton">猜</button>
        <button class="btn secondary" type="button" id="hintButton">提示</button>
        <button class="btn secondary" type="button" id="nextButton">下一题</button>
        <div class="message" id="message">观察图形关系，不只是看单个元素。</div>
        <div class="answer" id="answer" hidden>
          <div class="small">答案</div>
          <div class="answer-name" id="answerName"></div>
          <div class="message" id="explain"></div>
        </div>
      </aside>
    </section>

    <footer class="foot">Designed by <a href="https://abnerzhao.com" target="_blank" rel="noreferrer">Abner Zhao</a></footer>
  </main>

  <script>
    const puzzles = [
      { scene: '🐔\n🧍', clue: '鸡和人都在画面里', answer: '鹤立鸡群', explain: '高高站出一群鸡，形容人或物很突出。' },
      { scene: '🌊 👀\n🌊 👀', clue: '到处都是水和眼睛', answer: '望洋兴叹', explain: '看着大水无可奈何，常指力量不足。' },
      { scene: '🏹 → 🦅\n🏹 → 🐇', clue: '一支箭想打两个目标', answer: '一箭双雕', explain: '一次行动达到两个目的。' },
      { scene: '🐍 + 👣\n➕ 🦶', clue: '蛇身边多画了脚', answer: '画蛇添足', explain: '多此一举，反而坏事。' },
      { scene: '👂 🔔\n🙈', clue: '捂住耳朵偷铃', answer: '掩耳盗铃', explain: '自己骗自己，以为别人不知道。' },
      { scene: '🐟\n🧊', clue: '鱼躺在冰上', answer: '如鱼得水', explain: '鱼遇到水才自在，反衬图中状态。' },
      { scene: '🌙\n🌸', clue: '月亮和花', answer: '花好月圆', explain: '花开正好，月亮正圆。' },
      { scene: '🧍🧍🧍\n🗣️', clue: '人多声音杂', answer: '七嘴八舌', explain: '形容很多人同时说话。' },
      { scene: '🔥 🚪\n🐟', clue: '火、门、鱼', answer: '城门失火', explain: '完整说法是城门失火，殃及池鱼。' },
      { scene: '👀\n📄', clue: '眼睛只看纸上', answer: '纸上谈兵', explain: '只在纸面讨论，不解决实际问题。' }
    ];

    function dailyPick(items, count) {
      const now = new Date();
      let seed = Number(`${now.getFullYear()}${String(now.getMonth() + 1).padStart(2, '0')}${String(now.getDate()).padStart(2, '0')}`) + 17;
      const pool = [...items];
      for (let i = pool.length - 1; i > 0; i -= 1) {
        seed = (seed * 9301 + 49297) % 233280;
        const j = seed % (i + 1);
        [pool[i], pool[j]] = [pool[j], pool[i]];
      }
      return pool.slice(0, count);
    }

    const dailyPuzzles = dailyPick(puzzles, 5);
    let index = 0;
    const scene = document.querySelector('#scene');
    const meta = document.querySelector('#meta');
    const input = document.querySelector('#answerInput');
    const message = document.querySelector('#message');
    const answer = document.querySelector('#answer');
    const answerName = document.querySelector('#answerName');
    const explain = document.querySelector('#explain');

    function normalize(value) {
      return value.trim().replace(/\s/g, '');
    }

    function render() {
      const item = dailyPuzzles[index];
      meta.textContent = `DAILY IDIOM ${index + 1}/${dailyPuzzles.length}`;
      scene.innerHTML = `${item.scene.replace(/\n/g, '<br>')}<small>${item.clue}</small>`;
      input.value = '';
      answer.hidden = true;
      answerName.textContent = '';
      explain.textContent = '';
      message.textContent = '观察图形关系，不只是看单个元素。';
      message.className = 'message';
      input.focus();
    }

    function reveal(strong) {
      const item = dailyPuzzles[index];
      answer.hidden = false;
      answerName.textContent = item.answer;
      explain.textContent = item.explain;
      message.textContent = strong ? '答对了。' : '答案已揭晓。';
      message.className = strong ? 'message strong' : 'message';
    }

    document.querySelector('#checkButton').addEventListener('click', () => {
      if (normalize(input.value) === dailyPuzzles[index].answer) reveal(true);
      else message.textContent = '还不对，注意图里的关系。';
    });
    document.querySelector('#hintButton').addEventListener('click', () => reveal(false));
    document.querySelector('#nextButton').addEventListener('click', () => {
      index = (index + 1) % dailyPuzzles.length;
      render();
    });
    input.addEventListener('keydown', (event) => {
      if (event.key === 'Enter') document.querySelector('#checkButton').click();
    });

    render();
  </script>
</body>
</html>
