<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#f6f3ea">
  <title>地理轮廓猜谜</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --bg: #f8f6ef;
      --ink: #151515;
      --muted: #6d6a62;
      --line: #e3ded2;
      --panel: #fffaf0;
      --accent: #0f766e;
      --accent-weak: #d7ebe6;
      --wrong: #9f2d20;
      --mono: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
      --sans: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--ink);
      font-family: var(--sans);
      letter-spacing: 0;
    }

    button,
    input {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .page {
      width: min(100%, 980px);
      margin: 0 auto;
      padding: 28px 18px 46px;
    }

    .site-head {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 18px;
      border-bottom: 1px solid var(--line);
      padding-bottom: 16px;
    }

    h1 {
      margin: 0;
      font-size: 24px;
      font-weight: 760;
      line-height: 1.15;
      letter-spacing: 0;
    }

    .site-meta,
    .nav-link,
    .stat-label,
    .small,
    .foot {
      color: var(--muted);
      font-family: var(--mono);
      font-size: 12px;
      line-height: 1.45;
    }

    .site-meta {
      margin-top: 6px;
    }

    .nav-link:hover {
      color: var(--ink);
    }

    .game-nav {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: flex-end;
    }

    .nav-link.is-active {
      color: var(--ink);
      font-weight: 700;
    }

    .dataset-tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      padding-top: 18px;
    }

    .tab-button {
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.42);
      color: var(--muted);
      font-weight: 720;
    }

    .tab-button.is-active {
      border-color: var(--accent);
      background: var(--accent);
      color: #fff;
    }

    .game {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 300px;
      gap: 18px;
      padding-top: 22px;
      align-items: start;
    }

    .map-panel,
    .side-panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 253, 247, 0.82);
    }

    .map-panel {
      min-height: 500px;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .shape-wrap {
      width: min(100%, 620px);
      aspect-ratio: 1.05;
      display: grid;
      place-items: center;
    }

    svg {
      width: 100%;
      height: 100%;
      overflow: visible;
    }

    .province-shape {
      fill: #19201f;
      stroke: #19201f;
      stroke-width: 1.5;
      stroke-linejoin: round;
    }

    .is-revealed .province-shape {
      fill: var(--accent);
      stroke: var(--accent);
    }

    .side-panel {
      padding: 16px;
      display: grid;
      gap: 14px;
    }

    .scorebar {
      border: 1px solid var(--line);
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.58);
      padding: 10px 11px;
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
    }

    .form {
      position: relative;
      display: grid;
      gap: 8px;
    }

    .guess-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
    }

    input {
      width: 100%;
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fffdf7;
      color: var(--ink);
      padding: 0 12px;
      outline: 0;
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-weak);
    }

    .suggestions {
      position: absolute;
      z-index: 10;
      top: 72px;
      left: 0;
      right: 0;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fffdf7;
      box-shadow: 0 12px 28px rgba(45, 42, 34, 0.12);
    }

    .suggestion {
      width: 100%;
      min-height: 36px;
      border: 0;
      border-bottom: 1px solid var(--line);
      background: transparent;
      color: var(--ink);
      padding: 0 11px;
      text-align: left;
    }

    .suggestion:last-child {
      border-bottom: 0;
    }

    .suggestion:hover,
    .suggestion.is-active {
      background: var(--accent-weak);
    }

    .btn {
      min-height: 42px;
      border: 1px solid var(--ink);
      border-radius: 6px;
      background: var(--ink);
      color: #fff;
      padding: 0 13px;
      font-weight: 720;
      white-space: nowrap;
    }

    .btn.secondary {
      background: transparent;
      color: var(--ink);
    }

    .btn:hover {
      opacity: 0.86;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .message {
      min-height: 22px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    .message.strong {
      color: var(--accent);
      font-weight: 720;
    }

    .message.error {
      color: var(--wrong);
    }

    .guesses {
      display: grid;
      gap: 7px;
    }

    .guess {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.42);
      padding: 9px 10px;
      font-size: 14px;
    }

    .guess-name {
      font-weight: 720;
    }

    .guess-hint {
      color: var(--muted);
      font-family: var(--mono);
      font-size: 12px;
      text-align: right;
    }

    .answer {
      border-top: 1px solid var(--line);
      padding-top: 14px;
      display: grid;
      gap: 9px;
    }

    .answer-name {
      font-size: 26px;
      font-weight: 780;
      line-height: 1.15;
    }

    .answer-detail {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
    }

    .answer-detail:empty {
      display: none;
    }

    .answer-intro {
      color: var(--ink);
      font-size: 14px;
      line-height: 1.65;
    }

    .answer-intro.is-collapsed {
      display: -webkit-box;
      overflow: hidden;
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 8;
    }

    .text-button {
      width: max-content;
      border: 0;
      background: transparent;
      color: var(--accent);
      padding: 0;
      font-size: 13px;
      font-weight: 720;
    }

    .answer-source {
      color: var(--muted);
      font-family: var(--mono);
      font-size: 12px;
      line-height: 1.45;
    }

    .answer-source a {
      color: var(--accent);
    }

    .foot {
      border-top: 1px solid var(--line);
      margin-top: 24px;
      padding-top: 14px;
    }

    @media (max-width: 820px) {
      .site-head {
        align-items: flex-start;
        flex-direction: column;
        gap: 12px;
      }

      .game {
        grid-template-columns: 1fr;
      }

      .map-panel {
        min-height: 360px;
        padding: 16px;
      }
    }

    @media (max-width: 460px) {
      .guess-row,
      .actions {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <header class="site-head">
      <div>
        <h1>地理轮廓猜谜</h1>
      </div>
      <nav class="game-nav" aria-label="小游戏导航">
        <a class="nav-link" href="games.html">全部</a>
        <a class="nav-link is-active" href="shape-guess.html">地理</a>
        <a class="nav-link" href="sudoku.html">数独</a>
        <a class="nav-link" href="maze.html">迷宫</a>
        <a class="nav-link" href="lantern-riddles.html">灯谜</a>
        <a class="nav-link" href="idiom-guess.html">成语</a>
        <a class="nav-link" href="english.html">英语</a>
      </nav>
    </header>

    <div class="dataset-tabs" aria-label="题库切换">
      <button class="tab-button is-active" type="button" data-dataset="countries">世界国家</button>
      <button class="tab-button" type="button" data-dataset="provinces">中国省份</button>
    </div>

    <section class="game" aria-label="地理轮廓猜谜">
      <div class="map-panel" id="mapPanel">
        <div class="shape-wrap" id="shapeWrap">
          <div class="small">正在加载地图数据...</div>
        </div>
      </div>

      <aside class="side-panel">
        <div class="scorebar">
          <span class="small" id="modeText">今日一题</span>
          <span class="small">已猜 <span id="guessCount">0</span>/6 · <span id="poolCount">--</span> 题库</span>
        </div>

        <form class="form" id="guessForm">
          <label class="small" for="guessInput" id="guessLabel">输入国家名称</label>
          <div class="guess-row">
            <input id="guessInput" autocomplete="off" placeholder="例如：中国 / 日本 / France">
            <button class="btn" type="submit">猜</button>
          </div>
          <div class="suggestions" id="suggestions" hidden></div>
        </form>

        <div class="message" id="message">每天固定一题，猜错会提示目标相对方向。</div>

        <div class="actions">
          <button class="btn secondary" type="button" id="dailyButton">今日一题</button>
          <button class="btn secondary" type="button" id="randomButton">随机下一题</button>
        </div>

        <div class="guesses" id="guesses"></div>

        <div class="answer" id="answer" hidden>
          <div class="small">答案</div>
          <div class="answer-name" id="answerName"></div>
          <div class="answer-detail" id="answerDetail"></div>
          <div class="answer-intro" id="answerIntro"></div>
          <button class="text-button" type="button" id="toggleIntro" hidden>展开全文</button>
          <div class="answer-source" id="answerSource"></div>
        </div>
      </aside>
    </section>

    <footer class="foot">Designed by <a href="https://abnerzhao.com" target="_blank" rel="noreferrer">Abner Zhao</a></footer>
  </main>

  <script>
    const PROVINCES_URL = 'data/china-provinces.geojson';
    const COUNTRIES_URL = 'https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json';
    const TOPOJSON_CLIENT_URL = 'https://cdn.jsdelivr.net/npm/topojson-client@3/dist/topojson-client.min.js';
    const ISO_CODES_URL = 'https://cdn.jsdelivr.net/npm/i18n-iso-countries@7.14.0/codes.json';
    const ISO_ZH_URL = 'https://cdn.jsdelivr.net/npm/i18n-iso-countries@7.14.0/langs/zh.json';
    const WIKI_API = 'https://zh.wikipedia.org/w/api.php';
    const MAX_GUESSES = 6;
    const MUNICIPALITIES = new Set(['北京市', '天津市', '上海市', '重庆市']);
    const SHORT_SUFFIXES = [
      '维吾尔自治区',
      '壮族自治区',
      '回族自治区',
      '自治区',
      '特别行政区',
      '省',
      '市'
    ];

    const state = {
      dataset: 'countries',
      pools: {},
      regions: [],
      answer: null,
      guesses: [],
      solved: false,
      mode: 'daily'
    };

    const shapeWrap = document.querySelector('#shapeWrap');
    const mapPanel = document.querySelector('#mapPanel');
    const form = document.querySelector('#guessForm');
    const input = document.querySelector('#guessInput');
    const suggestions = document.querySelector('#suggestions');
    const message = document.querySelector('#message');
    const guessesEl = document.querySelector('#guesses');
    const answerEl = document.querySelector('#answer');
    const answerName = document.querySelector('#answerName');
    const answerDetail = document.querySelector('#answerDetail');
    const answerIntro = document.querySelector('#answerIntro');
    const toggleIntro = document.querySelector('#toggleIntro');
    const answerSource = document.querySelector('#answerSource');
    const guessCount = document.querySelector('#guessCount');
    const poolCount = document.querySelector('#poolCount');
    const modeText = document.querySelector('#modeText');
    const dailyButton = document.querySelector('#dailyButton');
    const randomButton = document.querySelector('#randomButton');
    const datasetButtons = [...document.querySelectorAll('.tab-button')];
    const guessLabel = document.querySelector('#guessLabel');

    const displayNames = typeof Intl.DisplayNames === 'function'
      ? new Intl.DisplayNames(['zh-CN'], { type: 'region' })
      : null;
    let activeSuggestionIndex = -1;
    let selectedRegion = null;

    function stripSuffix(name) {
      return SHORT_SUFFIXES.reduce((result, suffix) => result.endsWith(suffix) ? result.slice(0, -suffix.length) : result, name);
    }

    function provinceAliases(name) {
      const short = stripSuffix(name);
      const aliases = new Set([name, short]);
      if (name === '内蒙古自治区') aliases.add('内蒙古');
      if (name === '广西壮族自治区') aliases.add('广西');
      if (name === '宁夏回族自治区') aliases.add('宁夏');
      if (name === '新疆维吾尔自治区') aliases.add('新疆');
      if (name === '西藏自治区') aliases.add('西藏');
      if (name === '香港特别行政区') aliases.add('香港');
      if (name === '澳门特别行政区') aliases.add('澳门');
      return [...aliases].filter(Boolean);
    }

    function countryAliases(name, englishName, iso2, iso3) {
      return [...new Set([name, englishName, iso2, iso3].filter(Boolean))];
    }

    function normalize(value) {
      return value.trim().toLowerCase().replace(/\s/g, '').replace(/臺/g, '台');
    }

    function mercatorY(lat) {
      return Math.log(Math.tan(Math.PI / 4 + lat * Math.PI / 360)) * 180 / Math.PI;
    }

    function rings(feature) {
      if (feature.geometry.type === 'Polygon') return feature.geometry.coordinates;
      return feature.geometry.coordinates.flat();
    }

    function points(feature) {
      return rings(feature).flat();
    }

    function centroid(feature) {
      const pts = points(feature);
      const totals = pts.reduce((acc, point) => {
        acc.lon += point[0];
        acc.lat += point[1];
        return acc;
      }, { lon: 0, lat: 0 });
      return {
        lon: totals.lon / pts.length,
        lat: totals.lat / pts.length
      };
    }

    function regionType(name) {
      if (MUNICIPALITIES.has(name)) return '直辖市';
      if (name.endsWith('自治区')) return '自治区';
      if (name.endsWith('特别行政区')) return '特别行政区';
      return '省';
    }

    function continentFor(center, iso2) {
      if (iso2 === 'AQ') return '南极洲';
      const { lon, lat } = center;
      if (lat < -55) return '南极洲';
      if (lon >= -170 && lon <= -25 && lat >= 8) return '北美洲';
      if (lon >= -92 && lon <= -30 && lat < 13) return '南美洲';
      if (lon >= -25 && lon <= 60 && lat >= -35 && lat <= 37) return '非洲';
      if (lon >= 110 && lon <= 180 && lat < 10) return '大洋洲';
      if (lon >= -25 && lon <= 65 && lat > 37) return '欧洲';
      if (lon > 60 && lon <= 180 && lat > 0) return '亚洲';
      if (lon >= 25 && lon <= 180 && lat <= 0) return '亚洲';
      return '大洋洲';
    }

    function toPath(feature) {
      const projected = rings(feature).map((ring) => ring.map(([lon, lat]) => [lon, mercatorY(lat)]));
      const all = projected.flat();
      const minX = Math.min(...all.map((p) => p[0]));
      const maxX = Math.max(...all.map((p) => p[0]));
      const minY = Math.min(...all.map((p) => p[1]));
      const maxY = Math.max(...all.map((p) => p[1]));
      const width = Math.max(maxX - minX, 1);
      const height = Math.max(maxY - minY, 1);
      const padding = 34;
      const scale = Math.min((512 - padding * 2) / width, (512 - padding * 2) / height);
      const offsetX = (512 - width * scale) / 2;
      const offsetY = (512 - height * scale) / 2;

      return projected.map((ring) => ring.map(([x, y], index) => {
        const sx = (x - minX) * scale + offsetX;
        const sy = 512 - ((y - minY) * scale + offsetY);
        return `${index === 0 ? 'M' : 'L'}${sx.toFixed(1)} ${sy.toFixed(1)}`;
      }).join(' ') + ' Z').join(' ');
    }

    function dailyIndex(length) {
      const now = new Date();
      const key = `${state.dataset}-${now.getFullYear()}-${now.getMonth() + 1}-${now.getDate()}`;
      let hash = 0;
      for (const char of key) hash = (hash * 31 + char.charCodeAt(0)) >>> 0;
      return hash % length;
    }

    function distanceKm(a, b) {
      const toRad = (n) => n * Math.PI / 180;
      const earth = 6371;
      const dLat = toRad(b.lat - a.lat);
      const dLon = toRad(b.lon - a.lon);
      const lat1 = toRad(a.lat);
      const lat2 = toRad(b.lat);
      const h = Math.sin(dLat / 2) ** 2 + Math.cos(lat1) * Math.cos(lat2) * Math.sin(dLon / 2) ** 2;
      return Math.round(earth * 2 * Math.atan2(Math.sqrt(h), Math.sqrt(1 - h)));
    }

    function direction(from, to) {
      const eastWest = to.lon - from.lon;
      const northSouth = to.lat - from.lat;
      const horizontal = Math.abs(eastWest) > 1.1 ? (eastWest > 0 ? '东' : '西') : '';
      const vertical = Math.abs(northSouth) > 1.1 ? (northSouth > 0 ? '北' : '南') : '';
      return `${horizontal}${vertical}` || '附近';
    }

    function findRegion(raw) {
      const value = normalize(raw);
      if (selectedRegion && normalize(selectedRegion.name) === value) return selectedRegion;
      return state.regions.find((region) => region.aliases.some((alias) => normalize(alias) === value));
    }

    function setMessage(text, kind = '') {
      message.textContent = text;
      message.className = `message ${kind}`.trim();
    }

    function wikiTitles(region) {
      return [region.name, region.fullName, region.englishName].filter((title, index, titles) => title && titles.indexOf(title) === index);
    }

    function wikiUrl(title) {
      return `https://zh.wikipedia.org/wiki/${encodeURIComponent(title)}`;
    }

    function loadScript(src, globalName) {
      if (window[globalName]) return Promise.resolve(window[globalName]);
      return new Promise((resolve, reject) => {
        const script = document.createElement('script');
        script.src = src;
        script.onload = () => resolve(window[globalName]);
        script.onerror = reject;
        document.head.appendChild(script);
      });
    }

    async function fetchJson(url) {
      const response = await fetch(url);
      if (!response.ok) throw new Error(`${url} ${response.status}`);
      return response.json();
    }

    async function fetchWikiIntro(region) {
      for (const title of wikiTitles(region)) {
        const params = new URLSearchParams({
          action: 'query',
          prop: 'extracts',
          exintro: '1',
          explaintext: '1',
          redirects: '1',
          format: 'json',
          origin: '*',
          titles: title
        });
        const response = await fetch(`${WIKI_API}?${params.toString()}`);
        if (!response.ok) continue;
        const data = await response.json();
        const page = Object.values(data.query?.pages || {})[0];
        const extract = page?.extract?.trim();
        if (extract) {
          return {
            title: page.title || title,
            extract
          };
        }
      }
      return null;
    }

    function searchRegions(raw) {
      const value = normalize(raw);
      if (!value) return state.regions.slice(0, 8);
      return state.regions
        .map((region) => {
          const alias = region.aliases.find((item) => normalize(item).includes(value));
          const exact = region.aliases.some((item) => normalize(item) === value);
          const starts = region.aliases.some((item) => normalize(item).startsWith(value));
          return alias ? { region, score: exact ? 0 : starts ? 1 : 2 } : null;
        })
        .filter(Boolean)
        .sort((a, b) => a.score - b.score || a.region.name.localeCompare(b.region.name, 'zh-CN'))
        .slice(0, 8)
        .map((item) => item.region);
    }

    function hideSuggestions() {
      suggestions.hidden = true;
      suggestions.innerHTML = '';
      activeSuggestionIndex = -1;
    }

    function renderSuggestions() {
      if (input.disabled) {
        hideSuggestions();
        return;
      }
      const matches = searchRegions(input.value);
      if (!matches.length) {
        hideSuggestions();
        return;
      }
      suggestions.innerHTML = matches.map((region, index) => `
        <button class="suggestion${index === activeSuggestionIndex ? ' is-active' : ''}" type="button" data-name="${region.name}">
          ${region.name}${region.englishName ? ` · ${region.englishName}` : ''}
        </button>
      `).join('');
      suggestions.hidden = false;
    }

    function chooseSuggestion(region) {
      selectedRegion = region;
      input.value = region.name;
      hideSuggestions();
      input.focus();
    }

    function setIntro(summary) {
      answerIntro.textContent = summary.extract;
      const shouldCollapse = summary.extract.length > 260;
      answerIntro.classList.toggle('is-collapsed', shouldCollapse);
      toggleIntro.hidden = !shouldCollapse;
      toggleIntro.textContent = '展开全文';
    }

    function renderShape() {
      shapeWrap.innerHTML = `
        <svg viewBox="0 0 512 512" role="img" aria-label="待猜行政区轮廓">
          <path class="province-shape" d="${state.answer.path}"></path>
        </svg>
      `;
      mapPanel.classList.toggle('is-revealed', state.solved || state.guesses.length >= MAX_GUESSES);
    }

    function renderGuesses() {
      guessesEl.innerHTML = state.guesses.map((guess) => `
        <div class="guess">
          <div class="guess-name">${guess.region.name}</div>
          <div class="guess-hint">${guess.correct ? '正确' : `向${guess.direction} · ${guess.distance}km`}</div>
        </div>
      `).join('');
      guessCount.textContent = state.guesses.length;
    }

    function reveal() {
      const revealedName = state.answer.name;
      answerName.textContent = state.answer.fullName || state.answer.name;
      answerDetail.textContent = [
        state.answer.englishName && state.answer.englishName !== state.answer.name ? state.answer.englishName : '',
        state.answer.continent || ''
      ].filter(Boolean).join(' · ');
      answerIntro.textContent = '正在加载简介...';
      answerIntro.classList.remove('is-collapsed');
      toggleIntro.hidden = true;
      answerSource.textContent = '';
      answerEl.hidden = false;
      mapPanel.classList.add('is-revealed');

      fetchWikiIntro(state.answer)
        .then((summary) => {
          if (state.answer.name !== revealedName) return;
          if (!summary) {
            answerIntro.textContent = '暂时没有获取到稳定简介。';
            answerIntro.classList.remove('is-collapsed');
            toggleIntro.hidden = true;
            answerSource.textContent = '';
            return;
          }
          setIntro(summary);
          answerSource.innerHTML = `来源：<a href="${wikiUrl(summary.title)}" target="_blank" rel="noreferrer">中文维基百科</a>`;
        })
        .catch(() => {
          answerIntro.textContent = '简介加载失败，可以稍后再试。';
          answerIntro.classList.remove('is-collapsed');
          toggleIntro.hidden = true;
          answerSource.textContent = '';
        });
    }

    function resetGame(region, mode) {
      state.answer = region;
      state.guesses = [];
      state.solved = false;
      state.mode = mode;
      modeText.textContent = mode === 'daily' ? '今日一题' : '随机题';
      input.value = '';
      input.disabled = false;
      selectedRegion = null;
      hideSuggestions();
      answerEl.hidden = true;
      answerName.textContent = '';
      answerDetail.textContent = '';
      answerIntro.textContent = '';
      answerIntro.classList.remove('is-collapsed');
      toggleIntro.hidden = true;
      toggleIntro.textContent = '展开全文';
      answerSource.textContent = '';
      setMessage(state.answer.kind === 'country'
        ? `提示：${state.answer.continent}。猜错会提示目标相对方向。`
        : (mode === 'daily' ? '每天固定一题，猜错会提示目标相对方向。' : '随机题已生成。'));
      renderShape();
      renderGuesses();
      input.focus();
    }

    function updateDatasetUi() {
      datasetButtons.forEach((button) => {
        button.classList.toggle('is-active', button.dataset.dataset === state.dataset);
      });
      guessLabel.textContent = state.dataset === 'countries' ? '输入国家或地区名称' : '输入省、自治区、直辖市或特别行政区名称';
      input.placeholder = state.dataset === 'countries' ? '例如：中国 / 日本 / France' : '例如：四川 / 上海 / 内蒙古';
    }

    function setDataset(dataset) {
      state.dataset = dataset;
      state.regions = state.pools[dataset] || [];
      updateDatasetUi();
      poolCount.textContent = state.regions.length || '--';
      hideSuggestions();
      if (!state.regions.length) {
        shapeWrap.innerHTML = '<div class="small">正在加载题库...</div>';
        return;
      }
      resetGame(state.regions[dailyIndex(state.regions.length)], 'daily');
    }

    function submitGuess(event) {
      event.preventDefault();
      if (!state.answer || state.solved || state.guesses.length >= MAX_GUESSES) return;

      const region = findRegion(input.value);
      if (!region) {
        setMessage('没找到这个名称，试试完整名称或简称。', 'error');
        return;
      }
      if (state.guesses.some((guess) => guess.region.name === region.name)) {
        setMessage('这个已经猜过了。', 'error');
        input.value = '';
        selectedRegion = null;
        hideSuggestions();
        return;
      }

      const correct = region.name === state.answer.name;
      state.guesses.push({
        region,
        correct,
        distance: distanceKm(region.center, state.answer.center),
        direction: direction(region.center, state.answer.center)
      });
      input.value = '';
      selectedRegion = null;
      hideSuggestions();
      renderGuesses();

      if (correct) {
        state.solved = true;
        input.disabled = true;
        setMessage(`答对了，用了 ${state.guesses.length} 次。`, 'strong');
        reveal();
        renderShape();
        return;
      }

      if (state.guesses.length >= MAX_GUESSES) {
        input.disabled = true;
        setMessage('次数用完了。', 'error');
        reveal();
        renderShape();
        return;
      }

      const latest = state.guesses[state.guesses.length - 1];
      setMessage(`不对，目标在它的${latest.direction}方向，约 ${latest.distance}km。`);
    }

    async function loadProvinces() {
      const response = await fetch(PROVINCES_URL);
      if (!response.ok) throw new Error(`GeoJSON ${response.status}`);
      const geojson = await response.json();
      return geojson.features
        .filter((feature) => feature.properties?.name && feature.geometry)
        .map((feature) => ({
          kind: 'province',
          name: stripSuffix(feature.properties.name),
          fullName: feature.properties.name,
          aliases: provinceAliases(feature.properties.name),
          center: centroid(feature),
          path: toPath(feature)
        }))
        .sort((a, b) => a.name.localeCompare(b.name, 'zh-CN'));
    }

    async function loadCountries() {
      const [topojson, topo, isoCodes, zhLocale] = await Promise.all([
        loadScript(TOPOJSON_CLIENT_URL, 'topojson'),
        fetchJson(COUNTRIES_URL),
        fetchJson(ISO_CODES_URL),
        fetchJson(ISO_ZH_URL)
      ]);
      const numericToAlpha2 = new Map(isoCodes.map((item) => [item[2], item[0]]));
      const countryNames = zhLocale.countries || {};
      const geojson = topojson.feature(topo, topo.objects.countries);
      return geojson.features
        .filter((feature) => feature.id && feature.geometry)
        .map((feature) => {
          const numeric = String(feature.id).padStart(3, '0');
          const iso2 = numericToAlpha2.get(numeric);
          const iso3 = isoCodes.find((item) => item[2] === numeric)?.[1];
          const englishName = feature.properties.name;
          const zhNames = iso2 ? countryNames[iso2] : null;
          const zhList = Array.isArray(zhNames) ? zhNames : zhNames ? [zhNames] : [];
          const name = zhList[1] || zhList[0] || (iso2 ? displayNames?.of(iso2) : '') || englishName;
          const center = centroid(feature);
          return {
            kind: 'country',
            name,
            fullName: name,
            englishName,
            iso2,
            iso3,
            continent: continentFor(center, iso2),
            aliases: countryAliases(name, englishName, iso2, iso3).concat(zhList),
            center,
            path: toPath(feature)
          };
        })
        .sort((a, b) => a.name.localeCompare(b.name, 'zh-CN'));
    }

    async function loadRegions() {
      const [countries, provinces] = await Promise.allSettled([loadCountries(), loadProvinces()]);
      state.pools = {
        countries: countries.status === 'fulfilled' ? countries.value : [],
        provinces: provinces.status === 'fulfilled' ? provinces.value : []
      };
      if (!state.pools.countries.length && state.pools.provinces.length) state.dataset = 'provinces';
      if (!state.pools.countries.length && !state.pools.provinces.length) throw new Error('No datasets loaded');
      setDataset(state.dataset);
    }

    form.addEventListener('submit', submitGuess);
    input.addEventListener('input', () => {
      selectedRegion = null;
      activeSuggestionIndex = -1;
      renderSuggestions();
    });
    input.addEventListener('focus', renderSuggestions);
    input.addEventListener('keydown', (event) => {
      if (suggestions.hidden) return;
      const matches = searchRegions(input.value);
      if (!matches.length) return;

      if (event.key === 'ArrowDown') {
        event.preventDefault();
        activeSuggestionIndex = Math.min(activeSuggestionIndex + 1, matches.length - 1);
        renderSuggestions();
      } else if (event.key === 'ArrowUp') {
        event.preventDefault();
        activeSuggestionIndex = Math.max(activeSuggestionIndex - 1, 0);
        renderSuggestions();
      } else if (event.key === 'Enter' && activeSuggestionIndex >= 0) {
        event.preventDefault();
        chooseSuggestion(matches[activeSuggestionIndex]);
      } else if (event.key === 'Escape') {
        hideSuggestions();
      }
    });
    suggestions.addEventListener('mousedown', (event) => {
      event.preventDefault();
      const button = event.target.closest('.suggestion');
      if (!button) return;
      const region = state.regions.find((item) => item.name === button.dataset.name);
      if (region) chooseSuggestion(region);
    });
    document.addEventListener('click', (event) => {
      if (!form.contains(event.target)) hideSuggestions();
    });
    toggleIntro.addEventListener('click', () => {
      const collapsed = answerIntro.classList.toggle('is-collapsed');
      toggleIntro.textContent = collapsed ? '展开全文' : '收起';
    });
    dailyButton.addEventListener('click', () => resetGame(state.regions[dailyIndex(state.regions.length)], 'daily'));
    randomButton.addEventListener('click', () => {
      const index = Math.floor(Math.random() * state.regions.length);
      resetGame(state.regions[index], 'random');
    });
    datasetButtons.forEach((button) => {
      button.addEventListener('click', () => setDataset(button.dataset.dataset));
    });

    loadRegions().catch(() => {
      shapeWrap.innerHTML = '<div class="small">地图数据加载失败，请检查网络后刷新。</div>';
      form.querySelector('button').disabled = true;
      input.disabled = true;
      setMessage('无法加载 GeoJSON 数据。', 'error');
    });
  </script>
</body>
</html>
