<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#f8f6ef">
  <title>数独</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <script>
    window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
  </script>
  <script defer src="/_vercel/insights/script.js"></script>
  <style>
    * { box-sizing: border-box; }
    :root {
      --bg: #f8f6ef;
      --ink: #151515;
      --muted: #6d6a62;
      --line: #e3ded2;
      --accent: #0f766e;
      --accent-weak: #d7ebe6;
      --wrong: #9f2d20;
      --mono: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
      --sans: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
    }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--ink);
      font-family: var(--sans);
      letter-spacing: 0;
    }
    a { color: inherit; text-decoration: none; }
    button, input { font: inherit; }
    button { cursor: pointer; }
    .page {
      width: min(100%, 980px);
      margin: 0 auto;
      padding: 28px 18px 46px;
    }
    .site-head {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 18px;
      border-bottom: 1px solid var(--line);
      padding-bottom: 16px;
    }
    h1 {
      margin: 0;
      font-size: 24px;
      font-weight: 760;
      line-height: 1.15;
    }
    .nav-link,
    .small,
    .foot {
      color: var(--muted);
      font-family: var(--mono);
      font-size: 12px;
      line-height: 1.45;
    }
    .game-nav {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: flex-end;
    }
    .nav-link:hover,
    .nav-link.is-active {
      color: var(--ink);
    }
    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 280px;
      gap: 18px;
      padding-top: 22px;
      align-items: start;
    }
    .board-wrap,
    .panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 253, 247, 0.82);
    }
    .board-wrap {
      padding: 18px;
      display: grid;
      place-items: center;
    }
    .board {
      width: min(100%, 560px);
      aspect-ratio: 1;
      display: grid;
      grid-template-columns: repeat(9, 1fr);
      border: 2px solid var(--ink);
      background: var(--ink);
      gap: 1px;
    }
    .cell {
      width: 100%;
      min-width: 0;
      border: 0;
      background: #fffdf7;
      color: var(--ink);
      text-align: center;
      font-size: clamp(18px, 5vw, 34px);
      font-weight: 640;
      outline: 0;
      border-radius: 0;
    }
    .cell:nth-child(3n) { border-right: 2px solid var(--ink); }
    .cell:nth-child(9n) { border-right: 0; }
    .cell:nth-child(n+19):nth-child(-n+27),
    .cell:nth-child(n+46):nth-child(-n+54) { border-bottom: 2px solid var(--ink); }
    .cell.is-fixed {
      background: #eef4ef;
      color: #0f3d38;
    }
    .cell.is-wrong {
      background: #f6ded9;
      color: var(--wrong);
    }
    .panel {
      padding: 16px;
      display: grid;
      gap: 12px;
    }
    .btn {
      min-height: 42px;
      border: 1px solid var(--ink);
      border-radius: 6px;
      background: var(--ink);
      color: #fff;
      padding: 0 13px;
      font-weight: 720;
    }
    .btn.secondary {
      background: transparent;
      color: var(--ink);
    }
    .message {
      min-height: 22px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }
    .message.strong {
      color: var(--accent);
      font-weight: 720;
    }
    .foot {
      border-top: 1px solid var(--line);
      margin-top: 24px;
      padding-top: 14px;
    }
    @media (max-width: 760px) {
      .site-head {
        align-items: flex-start;
        flex-direction: column;
      }
      .game-nav {
        justify-content: flex-start;
      }
      .layout {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <header class="site-head">
      <h1>数独</h1>
      <nav class="game-nav" aria-label="小游戏导航">
        <a class="nav-link" href="games.html">全部</a>
        <a class="nav-link" href="shape-guess.html">地理</a>
        <a class="nav-link is-active" href="sudoku.html">数独</a>
        <a class="nav-link" href="maze.html">迷宫</a>
        <a class="nav-link" href="lantern-riddles.html">灯谜</a>
        <a class="nav-link" href="idiom-guess.html">成语</a>
        <a class="nav-link" href="english.html">英语</a>
      </nav>
    </header>

    <section class="layout">
      <div class="board-wrap">
        <div class="board" id="board" aria-label="数独棋盘"></div>
      </div>
      <aside class="panel">
        <div class="small">EASY · 9x9</div>
        <div class="message" id="message">填入 1-9，点检查会标出冲突。</div>
        <button class="btn" type="button" id="checkButton">检查</button>
        <button class="btn secondary" type="button" id="clearButton">清空填写</button>
        <button class="btn secondary" type="button" id="solveButton">显示答案</button>
      </aside>
    </section>

    <footer class="foot">Designed by <a href="https://abnerzhao.com" target="_blank" rel="noreferrer">Abner Zhao</a></footer>
  </main>

  <script>
    const puzzle = '530070000600195000098000060800060003400803001700020006060000280000419005000080079';
    const solution = '534678912672195348198342567859761423426853791713924856961537284287419635345286179';
    const board = document.querySelector('#board');
    const message = document.querySelector('#message');
    const cells = [];

    function render() {
      board.innerHTML = '';
      cells.length = 0;
      [...puzzle].forEach((value, index) => {
        const input = document.createElement('input');
        input.className = 'cell';
        input.inputMode = 'numeric';
        input.maxLength = 1;
        input.dataset.index = index;
        if (value !== '0') {
          input.value = value;
          input.disabled = true;
          input.classList.add('is-fixed');
        }
        input.addEventListener('input', () => {
          input.value = input.value.replace(/[^1-9]/g, '').slice(0, 1);
          input.classList.remove('is-wrong');
        });
        cells.push(input);
        board.appendChild(input);
      });
    }

    function check() {
      let wrong = 0;
      cells.forEach((cell, index) => {
        cell.classList.remove('is-wrong');
        if (cell.value && cell.value !== solution[index]) {
          cell.classList.add('is-wrong');
          wrong += 1;
        }
      });
      const filled = cells.filter((cell) => cell.value).length;
      if (!wrong && filled === 81) {
        message.textContent = '完成。';
        message.className = 'message strong';
      } else if (!wrong) {
        message.textContent = `目前没有冲突，已填 ${filled}/81。`;
        message.className = 'message';
      } else {
        message.textContent = `${wrong} 个格子需要再看一下。`;
        message.className = 'message';
      }
    }

    document.querySelector('#checkButton').addEventListener('click', check);
    document.querySelector('#clearButton').addEventListener('click', () => {
      cells.forEach((cell, index) => {
        if (puzzle[index] === '0') cell.value = '';
        cell.classList.remove('is-wrong');
      });
      message.textContent = '已清空填写。';
      message.className = 'message';
    });
    document.querySelector('#solveButton').addEventListener('click', () => {
      cells.forEach((cell, index) => {
        cell.value = solution[index];
        cell.classList.remove('is-wrong');
      });
      message.textContent = '已显示答案。';
      message.className = 'message strong';
    });

    render();
  </script>
</body>
</html>
